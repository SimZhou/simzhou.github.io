baseURL = "http://simzhou.com/"
# 网站标题
# title = "SimZhou的个人主页"      # title在下面分语言指定
# [en, zh-cn, fr, ...] 设置默认的语言
defaultContentLanguage = "zh-cn"

theme = "loveit"
enableEmoji = true

[params]
  # LoveIt 主题版本
  version = "0.2.X"
  [params.social]
    email = "yihua.zhou@outlook.com"
    github = "SimZhou"
    # bilibili = "338402"
    # Steam = "astro2boy"
  [params.search]
    enable = true
    # 搜索引擎的类型 ("lunr", "algolia")
    type = "lunr"
    # 文章内容最长索引长度
    contentLength = 4000
    # 搜索框的占位提示语
    placeholder = ""
    # LoveIt 新增 | 0.2.1 最大结果数目
    maxResultLength = 10
    # LoveIt 新增 | 0.2.3 结果内容片段长度
    snippetLength = 50
    # LoveIt 新增 | 0.2.1 搜索结果中高亮部分的 HTML 标签
    highlightTag = "em"
    # LoveIt 新增 | 0.2.4 是否在搜索索引中使用基于 baseURL 的绝对路径
    absoluteURL = false
    [search.algolia]
      index = ""
      appID = ""
      searchKey = ""
    [params.math]
      enable = true
    [params.page]
      fontawesome = true
      [params.page.toc]
        auto = false
        keepStatic = false
      [params.page.seo]
        # image URL
        # 图片 URL
        images = []
        # Publisher info
        # 出版者信息
        [params.page.seo.publisher]
          name = "xxxx"
          logoUrl = "/images/avatar.png"
    # Header config
    # 页面头部导航栏配置
    [params.header]
      name = "123"
      # 该项配置在下面分语言定义了

    # Footer config
    # 页面底部信息配置
    [params.footer]
      enable = true
      # Custom content (HTML format is supported)
      # 自定义内容 (支持 HTML 格式)
      custom = ''
      # whether to show Hugo and theme info
      # 是否显示 Hugo 和主题信息
      hugo = true
      # whether to show copyright info
      # 是否显示版权信息
      copyright = true
      # whether to show the author
      # 是否显示作者
      author = true
      # site creation time
      # 网站创立年份
      since = 2020
      # ICP info only in China (HTML format is supported)
      # ICP 备案信息，仅在中国使用 (支持 HTML 格式)
      icp = ""
      # license info (HTML format is supported)
      # 许可协议信息 (支持 HTML 格式)
      

# Markup related configuration in Hugo
# Hugo 解析文档的配置
[markup]
  # Syntax Highlighting (https://gohugo.io/content-management/syntax-highlighting)
  # 语法高亮设置 (https://gohugo.io/content-management/syntax-highlighting)
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
    hl_Lines = ""
    lineNoStart = 1
    style = "monokai"
    tabWidth = 4
    # false is a necessary configuration (https://github.com/dillonzq/LoveIt/issues/158)
    # false 是必要的设置 (https://github.com/dillonzq/LoveIt/issues/158)
    noClasses = false
  # Goldmark is from Hugo 0.60 the default library used for Markdown
  # Goldmark 是 Hugo 0.60 以来的默认 Markdown 解析库
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true
    [markup.goldmark.renderer]
      # whether to use HTML tags directly in the document
      # 是否在文档中直接使用 HTML 标签
      unsafe = true
  # Table Of Contents settings
  # 目录设置
  [markup.tableOfContents]
    ordered = false
    startLevel = 1
    endLevel = 3

# [taxonomies]
#     tag = "tags"
#     category = "category"
#     mood = "moods"

[outputs]
  home = ["HTML", "CSS", "JSON"]


