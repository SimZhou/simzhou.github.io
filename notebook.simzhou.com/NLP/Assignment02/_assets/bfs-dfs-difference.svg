<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460">
  <rect width="900" height="460" fill="#f2f4f7"/>
  <text x="50" y="68" font-size="30" font-family="Georgia, serif" fill="#24313a">BFS vs DFS</text>
  <rect x="70" y="110" width="330" height="260" rx="24" fill="#ffffff" stroke="#2f7a65" stroke-width="4"/>
  <rect x="500" y="110" width="330" height="260" rx="24" fill="#ffffff" stroke="#d96c4f" stroke-width="4"/>
  <text x="110" y="160" font-size="28" font-family="Arial, sans-serif" fill="#2f7a65">BFS</text>
  <text x="110" y="205" font-size="20" font-family="Arial, sans-serif" fill="#59666e">• 逐层展开</text>
  <text x="110" y="240" font-size="20" font-family="Arial, sans-serif" fill="#59666e">• 常用队列实现</text>
  <text x="110" y="275" font-size="20" font-family="Arial, sans-serif" fill="#59666e">• 更容易得到最短层数路径</text>
  <text x="540" y="160" font-size="28" font-family="Arial, sans-serif" fill="#d96c4f">DFS</text>
  <text x="540" y="205" font-size="20" font-family="Arial, sans-serif" fill="#59666e">• 优先深入单条路径</text>
  <text x="540" y="240" font-size="20" font-family="Arial, sans-serif" fill="#59666e">• 常用栈或递归实现</text>
  <text x="540" y="275" font-size="20" font-family="Arial, sans-serif" fill="#59666e">• 节省部分层级展开开销</text>
  <text x="70" y="420" font-size="18" font-family="Arial, sans-serif" fill="#59666e">原图源失效，改为本地对比示意图。</text>
</svg>
