<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <rect width="900" height="420" fill="#eef4f2"/>
  <text x="50" y="68" font-size="30" font-family="Georgia, serif" fill="#24313a">BFS</text>
  <text x="50" y="104" font-size="20" font-family="Arial, sans-serif" fill="#59666e">广度优先搜索：按层访问，通常配合队列。</text>
  <g stroke="#61727a" stroke-width="4">
    <line x1="450" y1="130" x2="280" y2="220"/><line x1="450" y1="130" x2="450" y2="220"/><line x1="450" y1="130" x2="620" y2="220"/>
    <line x1="280" y1="220" x2="200" y2="320"/><line x1="280" y1="220" x2="360" y2="320"/>
