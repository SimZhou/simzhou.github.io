<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Nonlinear decision boundary schematic</title>
  <desc id="desc">A simple local schematic showing nonlinear feature mapping and a circular decision boundary.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ea"/>
      <stop offset="100%" stop-color="#e8f1ec"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <text x="60" y="80" font-size="30" font-family="Georgia, serif" fill="#27332f">非线性特征映射示意</text>
  <rect x="70" y="120" width="320" height="280" rx="24" fill="#ffffff" stroke="#8aa39a" stroke-width="3"/>
  <line x1="120" y1="350" x2="340" y2="160" stroke="#d96c4f" stroke-width="6"/>
  <circle cx="180" cy="290" r="10" fill="#2d7d60"/>
  <circle cx="230" cy="250" r="10" fill="#2d7d60"/>
  <circle cx="280" cy="210" r="10" fill="#2d7d60"/>
  <circle cx="200" cy="210" r="10" fill="#d96c4f"/>
  <circle cx="250" cy="170" r="10" fill="#d96c4f"/>
  <circle cx="300" cy="130" r="10" fill="#d96c4f"/>
  <text x="110" y="390" font-size="22" font-family="Arial, sans-serif" fill="#3a4a45">原始空间：线性可分性不足</text>
  <text x="430" y="275" font-size="54" font-family="Arial, sans-serif" fill="#5f706a">→</text>
  <rect x="520" y="120" width="360" height="280" rx="24" fill="#ffffff" stroke="#8aa39a" stroke-width="3"/>
  <ellipse cx="700" cy="250" rx="120" ry="95" fill="none" stroke="#2d7d60" stroke-width="6"/>
  <circle cx="650" cy="240" r="10" fill="#2d7d60"/>
  <circle cx="715" cy="210" r="10" fill="#2d7d60"/>
  <circle cx="760" cy="270" r="10" fill="#2d7d60"/>
  <circle cx="610" cy="160" r="10" fill="#d96c4f"/>
  <circle cx="795" cy="170" r="10" fill="#d96c4f"/>
  <circle cx="810" cy="330" r="10" fill="#d96c4f"/>
  <circle cx="580" cy="330" r="10" fill="#d96c4f"/>
  <text x="590" y="390" font-size="22" font-family="Arial, sans-serif" fill="#3a4a45">高维空间：得到圆形/椭圆决策边界</text>
  <text x="60" y="470" font-size="20" font-family="Arial, sans-serif" fill="#55635f">原图源已失效，当前用本地示意图替代，用于说明“经过非线性映射后可得到非线性决策边界”。</text>
</svg>
